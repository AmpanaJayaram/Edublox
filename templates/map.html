{% extends "base.html" %}
{% block title %}UniSearch — US Map{% endblock %}
{% block body %}

<section class="map-hero">
  <h1 class="hero-title" style="font-size:2.8rem;position:relative;z-index:1">Explore by <em>State</em></h1>
  <p style="color:rgba(255,255,255,.5);margin-top:.5rem;font-size:15px;position:relative;z-index:1">Click any state to see its universities</p>
</section>

<!-- Legend -->
<div style="max-width:1100px;margin:1.75rem auto .5rem;padding:0 2rem">
  <div class="map-legend" style="justify-content:flex-start;gap:1.5rem;flex-wrap:wrap">
    <div class="map-legend-item"><span class="legend-swatch t1"></span>Has R1 Universities</div>
    <div class="map-legend-item"><span class="legend-swatch t2"></span>Has R2 Universities</div>
    <div class="map-legend-item"><span class="legend-swatch both"></span>Has Both R1 &amp; R2</div>
    <div class="map-legend-item"><span class="legend-swatch t3"></span>Other Institutions</div>
  </div>
</div>

<!-- US Map via D3 -->
<div class="map-wrap">
  <div id="map-container" style="width:100%;border-radius:12px;overflow:hidden;background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow-md);">
    <svg id="us-map-svg" viewBox="0 0 960 600"></svg>
  </div>
</div>
<div class="map-tooltip" id="mapTip"></div>

<!-- State cards grid -->
<div class="states-grid" id="statesGrid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
let stateData = {};
let topoData  = null;

async function boot() {
  const [uniRes, topoRes] = await Promise.all([
    fetch('/api/state_summary'),
    fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
  ]);
  stateData = await uniRes.json();
  topoData  = await topoRes.json();
  drawMap();
  drawCards();
}
boot();

const ABBR = {"Alabama":"AL","Alaska":"AK","Arizona":"AZ","Arkansas":"AR","California":"CA",
"Colorado":"CO","Connecticut":"CT","Delaware":"DE","Florida":"FL","Georgia":"GA","Hawaii":"HI",
"Idaho":"ID","Illinois":"IL","Indiana":"IN","Iowa":"IA","Kansas":"KS","Kentucky":"KY",
"Louisiana":"LA","Maine":"ME","Maryland":"MD","Massachusetts":"MA","Michigan":"MI",
"Minnesota":"MN","Mississippi":"MS","Missouri":"MO","Montana":"MT","Nebraska":"NE",
"Nevada":"NV","New Hampshire":"NH","New Jersey":"NJ","New Mexico":"NM","New York":"NY",
"North Carolina":"NC","North Dakota":"ND","Ohio":"OH","Oklahoma":"OK","Oregon":"OR",
"Pennsylvania":"PA","Rhode Island":"RI","South Carolina":"SC","South Dakota":"SD",
"Tennessee":"TN","Texas":"TX","Utah":"UT","Vermont":"VT","Virginia":"VA",
"Washington":"WA","West Virginia":"WV","Wisconsin":"WI","Wyoming":"WY",
"District of Columbia":"DC"};

function getStateFill(abbr) {
  const d = stateData[abbr];
  if (!d) return '#e8edf2';
  const hasT1 = d.t1 > 0, hasT2 = d.t2 > 0;
  if (hasT1 && hasT2) return '#1a4a72';
  if (hasT1) return '#147a56';
  if (hasT2) return '#b35a20';
  if (d.total > 0) return '#8994a8';
  return '#e8edf2';
}

function drawMap() {
  const svg = d3.select('#us-map-svg');
  const projection = d3.geoAlbersUsa().scale(1300).translate([487,305]);
  const path = d3.geoPath().projection(projection);
  const states = topojson.feature(topoData, topoData.objects.states);
  const tip = document.getElementById('mapTip');

  svg.selectAll('path')
    .data(states.features)
    .join('path')
    .attr('class','s-path')
    .attr('d', path)
    .attr('fill', d => {
      const name = d.properties.name;
      const abbr = ABBR[name] || name;
      return getStateFill(abbr);
    })
    .attr('stroke','#fff').attr('stroke-width',1.2)
    .style('cursor','pointer')
    .on('mousemove', function(event, d) {
      const name = d.properties.name;
      const abbr = ABBR[name] || name;
      const sd = stateData[abbr] || {};
      tip.innerHTML = `
        <div class="map-tt-name">${name}</div>
        <div class="map-tt-row">🏛 ${sd.total||0} universities</div>
        ${sd.t1 ? `<div class="map-tt-row" style="color:#6ee7b7">● ${sd.t1} R1 (T1)</div>` : ''}
        ${sd.t2 ? `<div class="map-tt-row" style="color:#fdba74">● ${sd.t2} R2 (T2)</div>` : ''}
        <div class="map-tt-row" style="color:#c9922a;margin-top:6px;font-weight:600">Click to explore →</div>`;
      tip.className = 'map-tooltip show';
      tip.style.left = (event.clientX+14)+'px';
      tip.style.top  = (event.clientY-10)+'px';
    })
    .on('mouseleave', function() {
      tip.className = 'map-tooltip';
    })
    .on('click', function(event, d) {
      const name = d.properties.name;
      const abbr = ABBR[name] || name;
      if (abbr) window.location.href = '/state/' + abbr;
    })
    .on('mouseenter', function() {
      d3.select(this).raise().attr('stroke-width',2.2).attr('stroke','var(--gold)');
    })
    .on('mouseleave.stroke', function(event, d) {
      d3.select(this).attr('stroke','#fff').attr('stroke-width',1.2);
    });
}

function drawCards() {
  const grid = document.getElementById('statesGrid');
  const entries = Object.entries(stateData)
    .filter(([abbr]) => abbr.length === 2)
    .sort((a,b) => a[0].localeCompare(b[0]));

  grid.innerHTML = entries.map(([abbr, d]) => {
    const tiers = [];
    if (d.t1) tiers.push(`<span class="tier-tag t1"><span class="dot"></span>T1×${d.t1}</span>`);
    if (d.t2) tiers.push(`<span class="tier-tag t2"><span class="dot"></span>T2×${d.t2}</span>`);
    return `
    <a class="state-card" href="/state/${abbr}">
      <div class="state-abbr">${abbr}</div>
      <div class="state-count">${d.total} universities</div>
      <div class="state-tiers">${tiers.join('')}</div>
    </a>`;
  }).join('');
}
</script>{% endblock %}
