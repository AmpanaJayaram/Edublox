<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}UniSearch{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23c9922a'/%3E%3Ctext x='16' y='23' font-family='serif' font-size='22' font-weight='700' fill='%230c1b35' text-anchor='middle'%3EU%3C/text%3E%3C/svg%3E">
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-mark">U</div>
      <span class="nav-logo-name">UniSearch</span>
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path=='/' %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Browse
      </a>
      <a href="/map" class="nav-link {% if '/map' in request.path %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        Map
      </a>
      <a href="/match" class="nav-link {% if '/match' in request.path %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Match
      </a>
      <a href="/compare" class="nav-link {% if '/compare' in request.path %}active{% endif %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Compare
      </a>
    </div>
  </div>
</nav>
{% block body %}{% endblock %}
<script src="{{ url_for('static',filename='main.js') }}"></script>
{% block scripts %}{% endblock %}
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='polished_overrides.css') }}">
</body>
</html>
